<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | Soham Gandhi</title>
    <link rel="icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="experience.html" style="color: var(--accent);">Experience</a>
    <a href="projects.html">Projects</a>
    <a href="blog.html">Blog</a>
</nav>

<header class="page-header">
    <h1>Experience</h1>
    <p>A comprehensive timeline of my professional journey across hardware verification, IC design, software engineering, and embedded systems.</p>
</header>

<main>
    <section>
        <div class="grid-container" id="full-experience-list">
        </div>
    </section>
</main>

<footer>
    <a href="mailto:sohamgandhi@live.com" class="btn">Contact Me</a>
</footer>
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('experience/experience.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('full-experience-list');
                data.forEach(item => {
                    const card = `
                    <div class="card" style="margin-bottom: 2rem;">
                        <h3>${item.company}</h3>
                        <span class="company" style="color: var(--accent); font-weight: bold;">${item.role}</span>
                        <p style="font-size: 0.9rem; margin-bottom: 1rem;">${item.period} | ${item.location}</p>
                        <ul>
                            ${item.highlights.map(h => `<li>${h}</li>`).join('')}
                        </ul>
                    </div>
                `;
                    container.insertAdjacentHTML('beforeend', card);
                });
            });
    });
</script>
