<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | Soham Gandhi</title>

    <link rel="icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/style.css">

    <style>
        /* Custom Header for the Experience Timeline */
        .experience-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .experience-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .experience-header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Specific tweaks for experience cards to look like a timeline/resume */
        .resume-card {
            margin-bottom: 2rem;
        }

        .resume-header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
        }

        .resume-bullets {
            padding-left: 1.2rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            line-height: 1.6;
        }

        .resume-bullets li {
            margin-bottom: 0.5rem;
        }

        /* Custom Arrow Link */
        .read-more-link::after {
            content: ' \2192';
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .read-more-link:hover::after {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="experience.html" style="color: var(--accent);">Experience</a>
    <a href="projects.html">Projects</a>
    <a href="blog.html">Blog</a>
</nav>

<main class="container" style="padding-top: 6rem; padding-bottom: 4rem;">

    <div class="experience-header">
        <h1>Professional Experience</h1>
        <p>My background in digital IC design, software engineering, and hardware-software integration.</p>
    </div>

    <section>
        <div id="full-experience-list" style="max-width: 800px; margin: 0 auto;">
        </div>
    </section>

</main>

<footer>
    <p>&copy; 2026 Soham Gandhi.</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('experience/experience.json');
            if (!res.ok) throw new Error("Failed to load experience.json");

            const data = await res.json();
            const container = document.getElementById('full-experience-list');

            // Compatibility check: works whether JSON is a raw array [] or an object {"experience": []}
            const expList = data.experience ? data.experience : data;

            expList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card resume-card';

                // Build the bullet points
                const bullets = item.highlights.map(h => `<li>${h}</li>`).join('');

                // Optional Details Link
                const linkHTML = item.detailsLink ? `
                        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--card-border);">
                            <a href="${item.detailsLink}" class="read-more-link" style="font-size: 0.9rem; font-weight: bold; text-decoration: none; color: var(--text-color);">
                                Read Full Breakdown
                            </a>
                        </div>
                    ` : '';

                card.innerHTML = `
                        <div class="resume-header-row" style="margin-bottom: 0.2rem;">
                            <h3 style="margin-bottom: 0;">${item.company}</h3>
                            <span class="date" style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500;">
                                ${item.period}
                            </span>
                        </div>

                        <div class="resume-header-row">
                            <span class="company" style="color: var(--accent); font-weight: bold; font-size: 1.1rem;">
                                ${item.role}
                            </span>
                            <span class="location" style="color: var(--text-muted); font-size: 0.9rem;">
                                ${item.location}
                            </span>
                        </div>

                        <ul class="resume-bullets">
                            ${bullets}
                        </ul>

                        ${linkHTML}
                    `;

                container.appendChild(card);
            });
        } catch (e) {
            console.error("Error loading experience data:", e);
            document.getElementById('full-experience-list').innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px;">
                        <p style="color: var(--text-muted);">Unable to load experience at this time. Please check your network connection or the JSON file structure.</p>
                    </div>
                `;
        }
    });
</script>

</body>
</html>
