<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Soham Gandhi</title>
    <link rel="icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="experience.html">Experience</a>
    <a href="projects.html" style="color: var(--accent);">Projects</a>
    <a href="blog.html">Blog</a>
</nav>

<header class="page-header">
    <h1>All Projects</h1>
    <p>A comprehensive archive of my work spanning full-stack software development, hardware design, robotics, and interdisciplinary engineering.</p>
</header>

<main>
    <section>
        <div class="grid-container" id="full-projects-list">
        </div>
    </section>
</main>

<footer>
    <a href="mailto:sohamgandhi@live.com" class="btn">Contact Me</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('projects/projects.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('full-projects-list');
                data.forEach(proj => {
                    const card = `
                    <div class="card">
                        <h3>${proj.title}</h3>
                        <span class="date" style="color: var(--accent);">${proj.category}</span>
                        <p style="margin: 1rem 0; color: var(--text-muted);">${proj.description}</p>
                        <div class="project-tags">
                            ${proj.tags.map(t => `<span class="skill-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                    container.insertAdjacentHTML('beforeend', card);
                });
            });
    });

    document.addEventListener('DOMContentLoaded', () => {
        const filterBtns = document.querySelectorAll('.filter-btn');
        const items = document.querySelectorAll('.item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button styling
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                // Show or hide items based on data-category
                items.forEach(item => {
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });
            });
        });
    });
</script>
</body>
</html>
